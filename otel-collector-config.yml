receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1000
  attributes:
    actions:
      - key: service.name
        value: log4tc
        action: insert

exporters:
  logging:
    loglevel: debug

  # Optional: Export to stdout for debugging
  otlp/stdout:
    client:
      endpoint: 0.0.0.0:4317

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, attributes]
      exporters: [logging]

    metrics:
      receivers: [otlp]
      processors: [batch, attributes]
      exporters: [logging]

    logs:
      receivers: [otlp]
      processors: [batch, attributes]
      exporters: [logging]

extensions:
  health_check:
    endpoint: :13133
