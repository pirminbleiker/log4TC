version: '3.8'

services:
  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: otel-collector
    command: ["/otelcontribcol", "--config=/etc/otel-collector-config.yml"]
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Prometheus metrics
      - "8889:8889"   # Prometheus exporter
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml
    environment:
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13133"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Log4TC Service
  log4tc-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: log4tc-service
    ports:
      - "16150:16150"  # ADS listener (from PLC to Docker host)
      - "4318:4318"    # OTLP HTTP receiver
    environment:
      - LOG4TC_CONFIG=/etc/log4tc/config.json
      - RUST_LOG=log4tc_service=info
    volumes:
      - ./config.docker.json:/etc/log4tc/config.json:ro
    depends_on:
      otel-collector:
        condition: service_healthy
    command:
      - "--config"
      - "/etc/log4tc/config.json"
      - "--ads-port"
      - "16150"
    healthcheck:
      test: ["CMD", "sh", "-c", "echo '' | timeout 1 nc localhost 16150 || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
