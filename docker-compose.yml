services:
  # OpenTelemetry Collector - receives OTLP from log4tc, exports to stdout
  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: otel-collector
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "13133:13133" # Health check
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol/config.yaml:ro

  # Log4TC Service - receives ADS from PLC, forwards to OTEL Collector
  log4tc-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: log4tc-service
    ports:
      - "48898:48898"  # AMS/TCP (ADS via AMS routing from PLC)
      - "16150:16150"  # Legacy ADS listener (direct TCP)
      - "4318:4318"    # OTEL HTTP (optional, for testing)
    environment:
      - LOG4TC_CONFIG=/etc/log4tc/config.json
      - RUST_LOG=log4tc_service=debug,log4tc_ads=debug
    volumes:
      - ./config.docker.json:/etc/log4tc/config.json:ro
    depends_on:
      - otel-collector
    command: ["--config", "/etc/log4tc/config.json", "--ads-port", "16150"]
