services:
  log4tc-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: log4tc-service
    ports:
      - "48898:48898/tcp"   # AMS/TCP (ADS from PLC)
      - "48899:48899/udp"   # ADS UDP route discovery
    environment:
      - LOG4TC_CONFIG=/etc/log4tc/config.json
      - RUST_LOG=log4tc_service=info,log4tc_ads=info
    volumes:
      - ./config.docker.json:/etc/log4tc/config.json:ro
    networks:
      - default

networks:
  default:
    external: true
    name: grafana_default
